openapi: 3.1.0
info:
  title: Report Pilot API
  version: 0.1.0
  description: API for NL-to-SQL reporting with multi-DB and multi-LLM support.
servers:
  - url: /
    description: Local runtime (same origin)
tags:
  - name: Query
  - name: Export
  - name: Admin
  - name: Providers
  - name: Observability
paths:
  /v1/query/prompts/history:
    get:
      tags: [Query]
      summary: List prompt history for the current user
      parameters:
        - in: query
          name: data_source_id
          required: false
          schema:
            type: string
        - in: query
          name: q
          required: false
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: Prompt history entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromptHistoryResponse"
  /v1/saved-queries:
    get:
      tags: [Query]
      summary: List saved queries
      parameters:
        - in: query
          name: data_source_id
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Saved query entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedQueryListResponse"
    post:
      tags: [Query]
      summary: Create a saved query
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSavedQueryRequest"
      responses:
        "201":
          description: Saved query created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedQuery"
        "409":
          description: Duplicate saved query name for the same owner and data source
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required: [error, message]
  /v1/saved-queries/{savedQueryId}:
    get:
      tags: [Query]
      summary: Get a saved query
      parameters:
        - $ref: "#/components/parameters/SavedQueryId"
      responses:
        "200":
          description: Saved query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedQuery"
        "404":
          description: Saved query not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required: [error, message]
    put:
      tags: [Query]
      summary: Update a saved query
      parameters:
        - $ref: "#/components/parameters/SavedQueryId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSavedQueryRequest"
      responses:
        "200":
          description: Saved query updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedQuery"
        "404":
          description: Saved query or data source not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required: [error, message]
        "409":
          description: Duplicate saved query name for the same owner and data source
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required: [error, message]
    delete:
      tags: [Query]
      summary: Delete a saved query
      parameters:
        - $ref: "#/components/parameters/SavedQueryId"
      responses:
        "200":
          description: Saved query deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedQueryDeleteResponse"
        "404":
          description: Saved query not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required: [error, message]
  /v1/query/sessions:
    post:
      tags: [Query]
      summary: Create a query session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSessionResponse"
  /v1/query/sessions/{sessionId}/run:
    post:
      tags: [Query]
      summary: Generate SQL and execute a query session
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunSessionRequest"
      responses:
        "200":
          description: Query executed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunSessionResponse"
  /v1/query/sessions/{sessionId}/feedback:
    post:
      tags: [Query]
      summary: Submit feedback for a query session
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackRequest"
      responses:
        "200":
          description: Feedback stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
  /v1/query/sessions/{sessionId}/export:
    post:
      tags: [Export]
      summary: Download query results in selected format
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportRequest"
      responses:
        "200":
          description: Export file
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "400":
          description: Unsupported format
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required: [error]
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required: [error, message]
  /v1/query/sessions/{sessionId}/export/deliver:
    post:
      tags: [Export]
      summary: Deliver an export via download or email
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportDeliverRequest"
      responses:
        "200":
          description: Download file (when delivery_mode is download)
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
          headers:
            x-export-id:
              schema:
                type: string
              description: Export delivery tracking ID
        "202":
          description: Email delivery accepted (async)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportDeliverAccepted"
  /v1/exports/{exportId}/status:
    get:
      tags: [Export]
      summary: Check export delivery status
      parameters:
        - in: path
          name: exportId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Delivery status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportDeliveryStatus"
        "404":
          description: Export delivery not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required: [error, message]
  /v1/data-sources:
    get:
      tags: [Admin]
      summary: List registered data sources
      responses:
        "200":
          description: Data source list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataSourceListResponse"
    post:
      tags: [Admin]
      summary: Register a data source
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDataSourceRequest"
      responses:
        "201":
          description: Data source created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataSourceResponse"
  /v1/data-sources/{dataSourceId}:
    delete:
      tags: [Admin]
      summary: Delete a data source and its dependent data
      parameters:
        - $ref: "#/components/parameters/DataSourceId"
      responses:
        "200":
          description: Data source deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "404":
          description: Data source not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required: [error, message]
  /v1/data-sources/{dataSourceId}/introspect:
    post:
      tags: [Admin]
      summary: Introspect schema metadata for a data source
      parameters:
        - $ref: "#/components/parameters/DataSourceId"
      responses:
        "202":
          description: Introspection job started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobAcceptedResponse"
  /v1/data-sources/{dataSourceId}/import-schema:
    post:
      tags: [Admin]
      summary: Import schema from a DDL script (e.g. SSMS Generate Scripts output)
      parameters:
        - $ref: "#/components/parameters/DataSourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportSchemaRequest"
      responses:
        "200":
          description: Schema imported successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportSchemaResponse"
        "400":
          description: Invalid or empty DDL
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required: [error, message]
        "404":
          description: Data source not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required: [error, message]
  /v1/data-sources/{dataSourceId}/export:
    get:
      tags: [Admin]
      summary: Export a data source configuration snapshot as a JSON file
      description: >
        Returns a downloadable JSON file containing the full configuration for the
        specified data source — schema objects (with columns, relationships, indexes),
        semantic entities (with metric definitions), join policies, RAG notes,
        NL/SQL examples, and synonyms. The file can be re-imported via
        `POST /v1/data-sources/import`.
      parameters:
        - $ref: "#/components/parameters/DataSourceId"
      responses:
        "200":
          description: Export file download
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataSourceExport"
        "400":
          description: Invalid data source ID
        "404":
          description: Data source not found
  /v1/data-sources/import:
    post:
      tags: [Admin]
      summary: Import a data source from a previously exported JSON snapshot
      description: >
        Creates a new data source and all associated metadata (schema objects,
        semantic entities, join policies, RAG notes, NL/SQL examples, synonyms)
        from a JSON export file in a single atomic transaction. Triggers a RAG
        reindex on success.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DataSourceExport"
      responses:
        "201":
          description: Data source imported successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data_source_id:
                    type: string
                    format: uuid
                required: [ok, data_source_id]
        "400":
          description: Validation error in export payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required: [error, message]
  /v1/schema-objects:
    get:
      tags: [Admin]
      summary: List schema objects for a data source
      parameters:
        - in: query
          name: data_source_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Schema objects
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/SchemaObject"
                required: [items]
  /v1/schema-objects/{schemaObjectId}:
    patch:
      tags: [Admin]
      summary: Update schema object visibility for query context
      parameters:
        - $ref: "#/components/parameters/SchemaObjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SchemaObjectVisibilityRequest"
      responses:
        "200":
          description: Schema object updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchemaObject"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required: [error, message]
        "404":
          description: Schema object not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required: [error, message]
  /v1/semantic-entities:
    post:
      tags: [Admin]
      summary: Create or update semantic entity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SemanticEntityRequest"
      responses:
        "200":
          description: Semantic entity upserted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SemanticEntityResponse"
  /v1/metric-definitions:
    post:
      tags: [Admin]
      summary: Create or update metric definition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MetricDefinitionRequest"
      responses:
        "200":
          description: Metric definition upserted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricDefinitionResponse"
  /v1/join-policies:
    post:
      tags: [Admin]
      summary: Create or update join policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinPolicyRequest"
      responses:
        "200":
          description: Join policy upserted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JoinPolicyResponse"
  /v1/rag/reindex:
    post:
      tags: [Admin]
      summary: Trigger reindex for RAG documents
      parameters:
        - in: query
          name: data_source_id
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Reindex job started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobAcceptedResponse"
  /v1/rag/notes:
    get:
      tags: [Admin]
      summary: List RAG notes for a data source
      parameters:
        - in: query
          name: data_source_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: RAG notes list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RagNoteListResponse"
    post:
      tags: [Admin]
      summary: Create or update a RAG note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RagNoteRequest"
      responses:
        "200":
          description: RAG note upserted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RagNoteResponse"
  /v1/rag/notes/{noteId}:
    delete:
      tags: [Admin]
      summary: Delete a RAG note
      parameters:
        - $ref: "#/components/parameters/NoteId"
      responses:
        "200":
          description: RAG note deleted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/OkResponse"
                  - type: object
                    properties:
                      id:
                        type: string
                    required: [id]
        "404":
          description: RAG note not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required: [error, message]
  /v1/llm/providers:
    get:
      tags: [Providers]
      summary: List configured LLM providers
      responses:
        "200":
          description: Provider configs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmProviderListResponse"
    post:
      tags: [Providers]
      summary: Register or update an LLM provider config
      description: |
        Creates or updates a provider configuration.

        `api_key_ref` is write-only and is never returned in API responses. When updating an existing
        provider, omit `api_key_ref` to preserve the current stored key or reference. Send a new
        non-empty value to rotate the key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LlmProviderRequest"
      responses:
        "200":
          description: Provider config upserted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmProviderResponse"
  /v1/llm/routing-rules:
    post:
      tags: [Providers]
      summary: Configure provider routing policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoutingRuleRequest"
      responses:
        "200":
          description: Routing rule upserted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutingRuleResponse"
  /v1/health/providers:
    get:
      tags: [Providers]
      summary: Provider health status
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        provider:
                          type: string
                        status:
                          type: string
                          enum: [healthy, degraded, down]
                        checked_at:
                          type: string
                          format: date-time
                      required: [provider, status, checked_at]
                required: [items]
  /v1/observability/metrics:
    get:
      tags: [Observability]
      summary: Aggregated observability metrics over a time window
      parameters:
        - in: query
          name: window_hours
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 720
      responses:
        "200":
          description: Metrics snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObservabilityMetricsResponse"
  /v1/observability/release-gates:
    get:
      tags: [Observability]
      summary: Latest benchmark release-gate outcome
      responses:
        "200":
          description: Latest benchmark release gate status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseGatesResponse"
        "404":
          description: No benchmark report found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required: [error, message]
  /v1/observability/benchmark-command:
    get:
      tags: [Observability]
      summary: Benchmark CLI command derived from runtime configuration
      responses:
        "200":
          description: Shell command and environment values for running the benchmark
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BenchmarkCommandResponse"
  /v1/observability/release-gates/report:
    post:
      tags: [Observability]
      summary: Persist a benchmark report for release-gate tracking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BenchmarkReportUploadRequest"
      responses:
        "201":
          description: Benchmark report stored
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  created_at:
                    type: string
                    format: date-time
                required: [id, created_at]
components:
  parameters:
    SessionId:
      in: path
      name: sessionId
      required: true
      schema:
        type: string
    DataSourceId:
      in: path
      name: dataSourceId
      required: true
      schema:
        type: string
    NoteId:
      in: path
      name: noteId
      required: true
      schema:
        type: string
    SchemaObjectId:
      in: path
      name: schemaObjectId
      required: true
      schema:
        type: string
    SavedQueryId:
      in: path
      name: savedQueryId
      required: true
      schema:
        type: string
  schemas:
    PromptHistoryItem:
      type: object
      properties:
        id:
          type: string
        question:
          type: string
        data_source_id:
          type: string
        created_at:
          type: string
          format: date-time
        latest_sql:
          type: string
          nullable: true
      required: [id, question, data_source_id, created_at]
    PromptHistoryResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PromptHistoryItem"
      required: [items]
    SavedQuery:
      type: object
      properties:
        id:
          type: string
        owner_id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        data_source_id:
          type: string
        sql:
          type: string
        default_run_params:
          type: object
          additionalProperties: false
          properties:
            llm_provider:
              type: string
            model:
              type: string
            max_rows:
              type: integer
              minimum: 1
              maximum: 100000
            timeout_ms:
              type: integer
              minimum: 1000
              maximum: 120000
            no_execute:
              type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, owner_id, name, data_source_id, sql, default_run_params, created_at, updated_at]
    SavedQueryListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SavedQuery"
      required: [items]
    SavedQueryDeleteResponse:
      type: object
      properties:
        ok:
          type: boolean
        id:
          type: string
      required: [ok, id]
    CreateSavedQueryRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 1000
        data_source_id:
          type: string
        sql:
          type: string
        default_run_params:
          type: object
          additionalProperties: false
          properties:
            llm_provider:
              type: string
            model:
              type: string
            max_rows:
              type: integer
              minimum: 1
              maximum: 100000
            timeout_ms:
              type: integer
              minimum: 1000
              maximum: 120000
            no_execute:
              type: boolean
      required: [name, data_source_id, sql]
    UpdateSavedQueryRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 1000
        data_source_id:
          type: string
        sql:
          type: string
        default_run_params:
          type: object
          additionalProperties: false
          properties:
            llm_provider:
              type: string
            model:
              type: string
            max_rows:
              type: integer
              minimum: 1
              maximum: 100000
            timeout_ms:
              type: integer
              minimum: 1000
              maximum: 120000
            no_execute:
              type: boolean
      required: [name, data_source_id, sql]
    CreateSessionRequest:
      type: object
      properties:
        data_source_id:
          type: string
        question:
          type: string
      required: [data_source_id, question]
    CreateSessionResponse:
      type: object
      properties:
        session_id:
          type: string
        status:
          type: string
          enum: [created]
      required: [session_id, status]
    RunSessionRequest:
      type: object
      properties:
        llm_provider:
          type: string
        model:
          type: string
        sql_override:
          type: string
          description: Optional SQL to execute directly, skipping LLM generation.
        no_execute:
          type: boolean
          description: When true, generate and validate SQL without connecting to or executing against the source database.
        max_rows:
          type: integer
          minimum: 1
          maximum: 100000
        timeout_ms:
          type: integer
          minimum: 1000
          maximum: 120000
