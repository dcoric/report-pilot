                type: string
              provider:
                type: string
              default_model:
                type: string
              base_url:
                type: string
              display_name:
                type: string
              enabled:
                type: boolean
              created_at:
                type: string
                format: date-time
              updated_at:
                type: string
                format: date-time
            required: [id, provider, default_model, enabled, created_at, updated_at]
      required: [items]
