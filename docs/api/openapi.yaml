    DataSourceExport:
      type: object
      description: >
        Portable snapshot of a data source and all its associated configuration.
        Produced by GET /v1/data-sources/{id}/export and consumed by
        POST /v1/data-sources/import.
      properties:
        version:
          type: integer
          example: 1
        exported_at:
          type: string
          format: date-time
        data_source:
          type: object
          properties:
            name:
              type: string
            db_type:
              type: string
              enum: [postgres, mssql]
            connection_ref:
              type: string
          required: [name, db_type, connection_ref]
        schema_objects:
          type: array
          items:
            type: object
            properties:
              object_type:
                type: string
                enum: [table, view, materialized_view]
              schema_name:
                type: string
              object_name:
                type: string
              description:
                type: string
                nullable: true
              is_ignored:
                type: boolean
              columns:
                type: array
                items:
                  type: object
                  properties:
                    column_name:
                      type: string
                    data_type:
                      type: string
                    nullable:
                      type: boolean
                    is_pk:
                      type: boolean
                    ordinal_position:
                      type: integer
                  required: [column_name, data_type, nullable, is_pk, ordinal_position]
              relationships:
                type: array
                items:
                  type: object
                  properties:
                    from_column:
                      type: string
                    to_schema:
                      type: string
                    to_object:
                      type: string
                    to_column:
                      type: string
                    relationship_type:
                      type: string
                      enum: [fk, inferred]
                  required: [from_column, to_schema, to_object, to_column, relationship_type]
              indexes:
                type: array
                items:
                  type: object
                  properties:
                    index_name:
                      type: string
                    columns:
                      type: array
                      items:
                        type: string
                    is_unique:
                      type: boolean
                  required: [index_name, columns, is_unique]
            required: [object_type, schema_name, object_name]
        rag_notes:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
              content:
                type: string
              active:
                type: boolean
            required: [title, content]
        semantic_entities:
          type: array
          items:
            type: object
            properties:
              entity_type:
                type: string
                enum: [table, column, metric, dimension, rule]
              target_ref:
                type: string
              business_name:
                type: string
              description:
                type: string
                nullable: true
              owner:
                type: string
                nullable: true
              active:
                type: boolean
              metric_definitions:
                type: array
                items:
                  type: object
                  properties:
                    sql_expression:
                      type: string
                    grain:
                      type: string
                      nullable: true
                    filters_json:
                      type: string
                      nullable: true
                  required: [sql_expression]
            required: [entity_type, target_ref, business_name]
        join_policies:
          type: array
          items:
            type: object
            properties:
              left_ref:
                type: string
              right_ref:
                type: string
              join_type:
                type: string
              on_clause:
                type: string
              approved:
                type: boolean
              notes:
                type: string
                nullable: true
            required: [left_ref, right_ref, join_type, on_clause]
        nl_sql_examples:
          type: array
          items:
            type: object
            properties:
              question:
                type: string
              sql:
                type: string
              quality_score:
                type: number
                nullable: true
              source:
                type: string
                enum: [manual, feedback]
            required: [question, sql]
        synonyms:
          type: array
          items:
            type: object
            properties:
              term:
                type: string
              maps_to_ref:
                type: string
              weight:
                type: number
                nullable: true
            required: [term, maps_to_ref]
      required: [version, data_source]
